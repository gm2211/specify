sonar.projectKey=specify
sonar.projectName=Specify
sonar.sourceEncoding=UTF-8

sonar.sources=src,scripts,webapp/src,deploy/terraform,Dockerfile
sonar.tests=src,webapp/src
sonar.test.inclusions=src/**/*.test.ts,webapp/src/**/*.test.ts,webapp/src/**/*.test.tsx

sonar.exclusions=dist/**,node_modules/**,webapp/node_modules/**,.beads/**,.specify/**,.worktrees/**,assets/**
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,src/spec/examples/**,templates/**
sonar.cpd.exclusions=**/*.test.ts,src/spec/examples/**

sonar.typescript.tsconfigPaths=tsconfig.json,webapp/tsconfig.json
sonar.javascript.lcov.reportPaths=coverage/lcov.info,webapp/coverage/lcov.info
