<svg xmlns="http://www.w3.org/2000/svg" width="820" height="540" viewBox="0 0 820 540">
  <style>
    .bg { fill: #1e1e2e; }
    .titlebar { fill: #313244; }
    .btn-red { fill: #f38ba8; }
    .btn-yellow { fill: #f9e2af; }
    .btn-green { fill: #a6e3a1; }
    .prompt { fill: #89b4fa; font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Menlo, monospace; font-size: 13px; }
    .cmd { fill: #cdd6f4; font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Menlo, monospace; font-size: 13px; }
    .out { fill: #a6adc8; font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Menlo, monospace; font-size: 13px; }
    .green { fill: #a6e3a1; }
    .dim { fill: #6c7086; }
    .yellow { fill: #f9e2af; }
    .red { fill: #f38ba8; }
    .blue { fill: #89b4fa; }
    .mauve { fill: #cba6f7; }
    .title-text { fill: #cdd6f4; font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Menlo, monospace; font-size: 12px; }
  </style>

  <!-- Window -->
  <rect class="bg" width="820" height="540" rx="10"/>
  <rect class="titlebar" width="820" height="36" rx="10"/>
  <rect class="titlebar" x="0" y="26" width="820" height="10"/>
  <circle class="btn-red" cx="20" cy="18" r="6"/>
  <circle class="btn-yellow" cx="40" cy="18" r="6"/>
  <circle class="btn-green" cx="60" cy="18" r="6"/>
  <text class="title-text" x="410" y="22" text-anchor="middle">specify — terminal</text>

  <!-- Line 1: lint -->
  <text y="68" x="20">
    <tspan class="prompt">❯ </tspan><tspan class="cmd">specify spec lint --spec my-app.spec.yaml</tspan>
  </text>
  <text class="green" y="90" x="20">✓ Spec is valid (0 errors, 0 warnings)</text>

  <!-- Line 2: blank + validate -->
  <text y="122" x="20">
    <tspan class="prompt">❯ </tspan><tspan class="cmd">specify spec validate --spec my-app.spec.yaml --capture ./captures</tspan>
  </text>
  <text class="out" y="144" x="20">Validating 4 pages, 3 scenarios, 2 flows...</text>
  <text y="166" x="20">
    <tspan class="green">  ✓ dashboard</tspan><tspan class="dim">         12/12 assertions passed</tspan>
  </text>
  <text y="186" x="20">
    <tspan class="green">  ✓ settings</tspan><tspan class="dim">          8/8 assertions passed</tspan>
  </text>
  <text y="206" x="20">
    <tspan class="red">  ✗ checkout</tspan><tspan class="dim">          5/7 assertions passed</tspan>
  </text>
  <text y="226" x="20">
    <tspan class="yellow">  ○ admin-panel</tspan><tspan class="dim">       untested (no captures)</tspan>
  </text>
  <text y="256" x="20">
    <tspan class="out">Summary: </tspan><tspan class="green">25 passed</tspan><tspan class="out"> · </tspan><tspan class="red">2 failed</tspan><tspan class="out"> · </tspan><tspan class="yellow">5 untested</tspan><tspan class="out"> · </tspan><tspan class="blue">78% coverage</tspan>
  </text>

  <!-- Line 3: blank + export -->
  <text y="288" x="20">
    <tspan class="prompt">❯ </tspan><tspan class="cmd">specify spec export --spec my-app.spec.yaml --framework playwright</tspan>
  </text>
  <text class="out" y="310" x="20">Generated 4 test files:</text>
  <text y="330" x="20">
    <tspan class="dim">  →</tspan><tspan class="mauve"> tests/dashboard.spec.ts</tspan><tspan class="dim">    (12 assertions)</tspan>
  </text>
  <text y="350" x="20">
    <tspan class="dim">  →</tspan><tspan class="mauve"> tests/settings.spec.ts</tspan><tspan class="dim">     (8 assertions)</tspan>
  </text>
  <text y="370" x="20">
    <tspan class="dim">  →</tspan><tspan class="mauve"> tests/checkout.spec.ts</tspan><tspan class="dim">     (7 assertions)</tspan>
  </text>
  <text y="390" x="20">
    <tspan class="dim">  →</tspan><tspan class="mauve"> tests/admin-panel.spec.ts</tspan><tspan class="dim">  (5 assertions)</tspan>
  </text>

  <!-- Line 4: blank + evolve -->
  <text y="422" x="20">
    <tspan class="prompt">❯ </tspan><tspan class="cmd">specify spec evolve --spec my-app.spec.yaml</tspan>
  </text>
  <text class="out" y="444" x="20">Analyzing spec for gaps...</text>
  <text y="466" x="20">
    <tspan class="yellow">  ⚡ checkout</tspan><tspan class="dim">  missing: error state assertions, empty cart flow</tspan>
  </text>
  <text y="486" x="20">
    <tspan class="yellow">  ⚡ settings</tspan><tspan class="dim">  missing: validation on email field</tspan>
  </text>
  <text y="516" x="20">
    <tspan class="out">Found </tspan><tspan class="yellow">3 suggestions</tspan><tspan class="out"> to strengthen spec coverage</tspan>
  </text>
</svg>
