version: "1.0"
name: "Specify CLI"
description: >
  Self-spec for the Specify CLI tool. Validates that all commands
  produce correct output, exit codes, and structured data formats.

cli:
  binary: "node dist/src/cli/index.js"

  commands:
    # -------------------------------------------------------------------
    # Help and self-description
    # -------------------------------------------------------------------
    - id: no-args-self-description
      description: "No arguments emits agent-friendly JSON self-description to stdout"
      args: []
      expected_exit_code: 0
      stdout_assertions:
        - type: json_path
          path: "name"
          value: "specify"
        - type: json_path
          path: "version"
          value: "0.1.0"
        - type: json_schema
          description: "Self-description has required fields"
          schema:
            type: object
            required: ["name", "version", "commands", "global_options", "exit_codes"]

    - id: help-flag
      description: "The --help flag prints human-readable usage to stderr"
      args: ["--help"]
      expected_exit_code: 0
      stderr_assertions:
        - type: text_contains
          text: "Usage: specify"
        - type: text_contains
          text: "spec validate"
        - type: text_contains
          text: "agent run"
        - type: text_contains
          text: "cli run"
        - type: text_contains
          text: "spec evolve"
        - type: text_contains
          text: "human"

    # -------------------------------------------------------------------
    # Schema introspection
    # -------------------------------------------------------------------
    - id: schema-commands
      description: "Schema commands returns array of command definitions"
      args: ["schema", "commands"]
      expected_exit_code: 0
      stdout_assertions:
        - type: json_schema
          description: "Array of command objects"
          schema:
            type: array
            minItems: 10
            items:
              type: object
              required: ["name", "description", "parameters"]

    - id: schema-spec
      description: "Schema spec returns a JSON Schema document"
      args: ["schema", "spec"]
      expected_exit_code: 0
      stdout_assertions:
        - type: json_path
          path: "type"
          value: "object"
        - type: json_schema
          description: "Valid JSON Schema document"
          schema:
            type: object
            required: ["type", "properties"]

    - id: schema-report
      description: "Schema report returns a JSON Schema document"
      args: ["schema", "report"]
      expected_exit_code: 0
      stdout_assertions:
        - type: json_schema
          schema:
            type: object
            required: ["type", "properties"]

    # -------------------------------------------------------------------
    # Error handling
    # -------------------------------------------------------------------
    - id: unknown-command
      description: "Unknown command returns exit code 10 with structured error"
      args: ["foo", "bar"]
      expected_exit_code: 10
      stdout_assertions:
        - type: json_path
          path: "error"
          value: "unknown_command"
        - type: json_path
          path: "command"
          value: "foo bar"
        - type: text_contains
          text: "hint"

    - id: missing-spec-file
      description: "Validation with nonexistent spec returns exit code 10"
      args: ["spec", "validate", "--spec", "nonexistent-file-that-does-not-exist.yaml", "--capture", "."]
      expected_exit_code: 10
      stderr_assertions:
        - type: text_contains
          text: "Failed to load spec"
        - type: text_contains
          text: "Spec file not found"

    - id: missing-export-framework
      description: "Export without framework argument fails"
      args: ["spec", "export", "--spec", "src/spec/examples/login-page.yaml", "--framework", ""]
      expected_exit_code: 10
      stderr_assertions:
        - type: text_contains
          text: "Unsupported framework"
        - type: text_contains
          text: "playwright"

    # -------------------------------------------------------------------
    # Spec export (deterministic — no browser needed)
    # -------------------------------------------------------------------
    - id: export-playwright
      description: "Export spec as Playwright test code"
      args: ["spec", "export", "--spec", "src/spec/examples/login-page.yaml", "--framework", "playwright", "--json"]
      expected_exit_code: 0
      stdout_assertions:
        - type: json_schema
          description: "Array of generated test files"
          schema:
            type: array
            minItems: 1
            items:
              type: object
              required: ["filePath", "content", "framework"]
        - type: text_contains
          text: "playwright"
        - type: text_contains
          description: "Generated code imports from @playwright/test"
          text: "@playwright/test"

    - id: export-cypress
      description: "Export spec as Cypress test code"
      args: ["spec", "export", "--spec", "src/spec/examples/login-page.yaml", "--framework", "cypress", "--json"]
      expected_exit_code: 0
      stdout_assertions:
        - type: text_contains
          text: "cy.visit"
        - type: text_contains
          text: "cy.get"

    - id: export-multi-page-flow
      description: "Export multi-page flow produces multi-step test"
      args: ["spec", "export", "--spec", "src/spec/examples/multi-page-flow.yaml", "--framework", "playwright", "--json"]
      expected_exit_code: 0
      stdout_assertions:
        - type: text_contains
          description: "Contains navigate calls for flow steps"
          text: "page.goto"
        - type: text_contains
          description: "Contains interaction code"
          text: "page.locator"

    # -------------------------------------------------------------------
    # Spec evolve (interactive gap analysis)
    # -------------------------------------------------------------------
    - id: evolve-interactive
      description: "Interactive evolve produces structured suggestions"
      args: ["spec", "evolve", "--spec", "src/spec/examples/login-page.yaml", "--json"]
      expected_exit_code: 0
      stdout_assertions:
        - type: json_path
          path: "mode"
          value: "interactive"
        - type: json_schema
          description: "Evolve result has required structure"
          schema:
            type: object
            required: ["mode", "spec_summary", "suggestions"]
            properties:
              suggestions:
                type: array
                items:
                  type: object
                  required: ["id", "category", "priority", "description", "rationale", "proposed_change", "question"]

    - id: evolve-finds-gaps
      description: "Interactive evolve finds real gaps in example spec"
      args: ["spec", "evolve", "--spec", "src/spec/examples/login-page.yaml", "--json"]
      expected_exit_code: 0
      stdout_assertions:
        - type: json_path
          description: "Analyzes the login page spec"
          path: "spec_summary.page_count"
          value: 1
        - type: text_contains
          description: "Finds the missing-assertion scenario gap"
          text: "interactions but no assertions"

    - id: evolve-no-pr-flag-ok
      description: "Evolve without --pr uses interactive mode"
      args: ["spec", "evolve", "--spec", "specify.spec.yaml", "--json"]
      expected_exit_code: 0
      stdout_assertions:
        - type: json_path
          path: "mode"
          value: "interactive"
        - type: json_path
          description: "Sees our CLI commands"
          path: "spec_summary.cli_command_count"
          value: 20

    # -------------------------------------------------------------------
    # Spec import (heuristic analysis)
    # -------------------------------------------------------------------
    - id: import-nonexistent-dir
      description: "Import from nonexistent path fails gracefully"
      args: ["spec", "import", "--from", "nonexistent-test-dir-xyz"]
      expected_exit_code: 10
      stderr_assertions:
        - type: text_contains
          text: "Path not found"

    # -------------------------------------------------------------------
    # CLI run
    # -------------------------------------------------------------------
    - id: cli-run-no-cli-section
      description: "CLI run with spec that has no cli section fails"
      args: ["cli", "run", "--spec", "src/spec/examples/login-page.yaml"]
      expected_exit_code: 10
      stderr_assertions:
        - type: text_contains
          text: "no cli section"

    # -------------------------------------------------------------------
    # Spec validate (passive validation — no browser)
    # -------------------------------------------------------------------
    - id: validate-with-empty-capture
      description: "Validate spec against empty capture dir produces report"
      args: ["spec", "validate", "--spec", "src/spec/examples/login-page.yaml", "--capture", "src/spec/examples", "--json"]
      expected_exit_code: 0
      stdout_assertions:
        - type: json_schema
          description: "Gap report structure"
          schema:
            type: object
            required: ["spec", "capture", "summary", "pages"]
        - type: json_path
          path: "spec.name"
          value: "Login Page Spec"
        - type: json_path
          description: "Most assertions untested since no traffic"
          path: "summary.coverage"
          value: 5

    # -------------------------------------------------------------------
    # Spec sync
    # -------------------------------------------------------------------
    - id: sync-no-test-files
      description: "Spec sync fails when no test files found"
      args: ["spec", "sync", "--spec", "src/spec/examples/login-page.yaml", "--tests", "src/spec"]
      expected_exit_code: 10
      stderr_assertions:
        - type: text_contains
          text: "No test files found"

    # -------------------------------------------------------------------
    # Spec evolve (already partially covered above, add more)
    # -------------------------------------------------------------------
    - id: evolve-self-spec-finds-cli-gaps
      description: "Evolve finds assertion gaps in own CLI spec"
      args: ["spec", "evolve", "--spec", "specify.spec.yaml", "--json"]
      expected_exit_code: 0
      stdout_assertions:
        - type: json_path
          path: "mode"
          value: "interactive"
        - type: json_schema
          description: "Each suggestion has all required fields"
          schema:
            type: object
            required: ["suggestions"]
            properties:
              suggestions:
                type: array
                items:
                  type: object
                  required: ["id", "category", "priority", "description", "question"]

    - id: evolve-missing-spec
      description: "Evolve with nonexistent spec fails"
      args: ["spec", "evolve", "--spec", "nonexistent.yaml"]
      expected_exit_code: 10
      stderr_assertions:
        - type: text_contains
          text: "Failed to load spec"

  scenarios:
    # -------------------------------------------------------------------
    # Schema round-trip: all three schema targets work
    # -------------------------------------------------------------------
    - id: schema-introspection-suite
      description: "All schema targets produce valid JSON"
      steps:
        - id: schema-spec-step
          args: ["schema", "spec"]
          expected_exit_code: 0
          stdout_assertions:
            - type: json_schema
              schema:
                type: object

        - id: schema-report-step
          args: ["schema", "report"]
          expected_exit_code: 0
          stdout_assertions:
            - type: json_schema
              schema:
                type: object

        - id: schema-commands-step
          args: ["schema", "commands"]
          expected_exit_code: 0
          stdout_assertions:
            - type: json_schema
              schema:
                type: array

    # -------------------------------------------------------------------
    # Export → valid structure for both frameworks
    # -------------------------------------------------------------------
    - id: export-both-frameworks
      description: "Exporting the same spec to both frameworks succeeds"
      steps:
        - id: export-pw-step
          args: ["spec", "export", "--spec", "src/spec/examples/login-page.yaml", "--framework", "playwright", "--json"]
          expected_exit_code: 0
          stdout_assertions:
            - type: text_contains
              text: "@playwright/test"

        - id: export-cy-step
          args: ["spec", "export", "--spec", "src/spec/examples/login-page.yaml", "--framework", "cypress", "--json"]
          expected_exit_code: 0
          stdout_assertions:
            - type: text_contains
              text: "cy.visit"
