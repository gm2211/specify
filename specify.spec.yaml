version: "2"
name: "Specify CLI"
description: >
  Behavioral contract for the Specify CLI. Specify is an autonomous agent-driven
  platform for spec-first web application verification. It captures application
  behavior, generates specifications, and verifies implementations against those specs.

target:
  type: cli
  binary: ./specify

areas:
  - id: overview
    name: "Overview & Help"
    prose: >
      Running with no arguments returns a JSON manifest of all commands. Running
      with --help shows human-readable text. --version shows the semver string.
    behaviors:
      - id: no-args-returns-json-manifest
        description: >
          Running with no arguments exits 0 and outputs JSON manifest with commands,
          global options, exit codes, and hints
      - id: help-flag-shows-text
        description: >
          --help or -h shows human-readable help to stderr and exits 0
      - id: version-flag-shows-version
        description: >
          --version or -V outputs semver to stdout and exits 0
      - id: unknown-command-fails
        description: >
          Unknown commands output structured error JSON and exit 10

  - id: spec-lint
    name: "Spec Linting"
    prose: >
      Validates spec file structure without requiring captures. Schema validation
      plus semantic checks (duplicate IDs, empty descriptions).
    behaviors:
      - id: lint-valid-spec-exits-zero
        description: >
          Linting a valid spec outputs JSON result and exits 0
      - id: lint-invalid-spec-exits-nonzero
        description: >
          Linting an invalid spec outputs JSON with errors array and exits 10
      - id: lint-auto-discovers-spec
        description: >
          Without --spec, auto-discovers spec file from cwd
      - id: lint-accepts-stdin
        description: >
          --spec - reads spec YAML from stdin
      - id: lint-alias
        description: >
          Top-level 'specify lint' delegates to 'specify spec lint'

  - id: spec-generate
    name: "Spec Generation"
    prose: >
      Creates a v2 spec from captured traffic data. Groups endpoints into areas
      with behavioral descriptions.
    behaviors:
      - id: generate-requires-input
        description: >
          Without --input, outputs error JSON and exits 10
      - id: generate-missing-dir-fails
        description: >
          Nonexistent --input directory outputs error and exits 10
      - id: generate-writes-spec
        description: >
          Reads traffic.json from input dir and writes v2 spec to --output
      - id: generate-defaults-output
        description: >
          Without --output, writes to <parent-dir>/spec.yaml

  - id: spec-guide
    name: "Spec Authoring Guide"
    behaviors:
      - id: guide-outputs-json
        description: >
          Outputs JSON guide with schema, examples, patterns, and tips
      - id: guide-exits-zero
        description: >
          Exits 0

  - id: schema
    name: "Schema Introspection"
    behaviors:
      - id: schema-spec
        description: >
          'specify schema spec' outputs v2 JSON Schema definition
      - id: schema-commands
        description: >
          'specify schema commands' outputs full command manifest
      - id: schema-unknown-target-fails
        description: >
          Unknown target outputs error and exits 10

  - id: capture
    name: "Capture"
    prose: >
      Agent mode (default) launches an autonomous agent to explore a URL and
      generate a spec. Human mode (--human) opens a headed browser for manual
      recording.
    behaviors:
      - id: capture-requires-url
        description: >
          Without --url, outputs error JSON with missing_parameter and exits 10
      - id: capture-validates-url
        description: >
          Invalid --url outputs error JSON with invalid_url and exits 10
      - id: capture-agent-generates-spec
        description: >
          Agent explores the URL and writes a v2 spec to --spec-output
      - id: capture-headed-mode
        description: >
          --headed runs browser visibly instead of headless
      - id: capture-no-generate
        description: >
          --no-generate skips automatic spec generation
      - id: capture-human-mode
        description: >
          --human opens a headed browser for manual recording with traffic capture
      - id: capture-outputs-json
        description: >
          Outputs JSON to stdout with result, costUsd, outputDir, and area count
      - id: capture-shows-next-step
        description: >
          After success, stderr shows hint about 'specify review --spec <path>'

  - id: verify
    name: "Agent-Driven Verification"
    prose: >
      Runs an autonomous agent that validates an implementation against a spec.
      Reads spec, determines target type (web/api/cli), tests each behavior.
    behaviors:
      - id: verify-requires-spec
        description: >
          Without --spec and no auto-discoverable spec, outputs error and exits 10
      - id: verify-auto-discovers-spec
        description: >
          Without --spec, auto-discovers spec file from cwd
      - id: verify-uses-explicit-url
        description: >
          --url overrides the spec target URL for web/api targets
      - id: verify-uses-spec-target
        description: >
          Without --url, extracts URL from spec.target for web/api, binary for cli
      - id: verify-pass-exits-zero
        description: >
          All behaviors passed exits 0
      - id: verify-fail-exits-one
        description: >
          Any behavior failed exits 1
      - id: verify-outputs-json
        description: >
          Outputs JSON with result, costUsd, pass flag, and structured verification output
      - id: verify-writes-result-file
        description: >
          Writes verify-result.json to --output dir (default .specify/verify/)
      - id: verify-shows-review-hint
        description: >
          After verification, stderr shows 'specify review --spec ... --agent-report ...'

  - id: replay
    name: "Replay & Diff"
    prose: >
      Replays captured traffic against a target URL and compares responses.
    behaviors:
      - id: replay-requires-capture-and-url
        description: >
          Without --capture or --url, outputs error and exits 10
      - id: replay-compares-responses
        description: >
          Agent replays all requests and compares status codes, structure, and values
      - id: replay-outputs-json
        description: >
          Outputs JSON with result, costUsd, and diff summary

  - id: compare
    name: "Live Side-by-Side Comparison"
    prose: >
      Opens parallel browser sessions to --remote and --local URLs and compares behavior.
    behaviors:
      - id: compare-requires-remote-and-local
        description: >
          Without --remote or --local, outputs error and exits 10
      - id: compare-match-exits-zero
        description: >
          If systems match, exits 0
      - id: compare-mismatch-exits-one
        description: >
          If differences detected, exits 1
      - id: compare-outputs-json
        description: >
          Outputs JSON with result, costUsd, match flag, and structured output

  - id: review
    name: "Interactive Spec Browser"
    prose: >
      Generates a self-contained HTML file displaying spec with areas, behaviors,
      prose, and optional verification results overlay.
    behaviors:
      - id: review-requires-spec
        description: >
          Without --spec and no auto-discoverable spec, outputs error and exits 10
      - id: review-generates-html
        description: >
          Generates self-contained HTML with spec data, narrative, and results
      - id: review-auto-opens-browser
        description: >
          Opens generated HTML in default browser (skip with --no-open)
      - id: review-loads-agent-report
        description: >
          --agent-report loads verification results for overlay
      - id: review-auto-discovers-report
        description: >
          Auto-discovers agent report from .specify/verify/ if omitted
      - id: review-outputs-json
        description: >
          Outputs JSON with output path, spec name, and hasAgentReport flag

  - id: create
    name: "Interactive Spec Creation"
    prose: >
      Guided interview for creating a v2 spec from scratch.
    behaviors:
      - id: create-launches-interview
        description: >
          Prompts for app name, description, target type, and target value
      - id: create-shows-preview
        description: >
          Shows YAML preview and asks for confirmation before saving
      - id: create-writes-spec
        description: >
          Writes spec to --output (default spec.yaml) on confirmation
      - id: create-outputs-json
        description: >
          Outputs JSON with generated spec and file paths
      - id: create-exits-zero
        description: >
          Exits 0 on success or cancellation

  - id: interactive-mode
    name: "Interactive Modes"
    prose: >
      'specify human' is a context-aware wizard. 'specify human shell' is a REPL.
      'specify human watch' is a TUI dashboard.
    behaviors:
      - id: wizard-detects-project-state
        description: >
          Detects existing specs, captures, agent runs, and test frameworks in cwd
      - id: wizard-presents-menu
        description: >
          Shows arrow-key menu with Create, Capture, Review, Verify options
      - id: wizard-direct-action
        description: >
          'specify human <action>' skips menu and goes directly to workflow
      - id: shell-launches-repl
        description: >
          'specify human shell' starts REPL with tab completion and command history
      - id: shell-non-tty-fails
        description: >
          Shell without TTY exits 10
      - id: watch-launches-tui
        description: >
          'specify human watch --spec <path> --url <url>' shows ANSI dashboard
      - id: watch-requires-spec-and-url
        description: >
          Watch without --spec or --url exits 10
      - id: watch-requires-terminal
        description: >
          Watch without TTY outputs error

  - id: mcp-server
    name: "MCP Server"
    prose: >
      Exposes Specify capabilities as MCP tools for LLM clients.
    behaviors:
      - id: mcp-starts-stdio
        description: >
          'specify mcp' starts MCP server on stdio transport
      - id: mcp-http-transport
        description: >
          --http switches to HTTP transport with --port and --host options

  - id: clean
    name: "Cleanup"
    behaviors:
      - id: clean-removes-generated
        description: >
          Removes .specify/ directories and *.review.html files
      - id: clean-dry-run
        description: >
          --dry-run shows what would be removed without deleting
      - id: clean-exits-zero
        description: >
          Exits 0

  - id: error-handling
    name: "Error Handling & Exit Codes"
    prose: >
      Granular exit codes distinguish error categories. Structured JSON on error
      to stdout, human messages to stderr.
    behaviors:
      - id: exit-code-zero-success
        description: Exit 0 = success
      - id: exit-code-one-assertion-failure
        description: Exit 1 = behavioral verification failed
      - id: exit-code-ten-parse-error
        description: Exit 10 = argument parsing, file not found, or invalid YAML
      - id: exit-code-twelve-timeout
        description: Exit 12 = operation timed out or agent reached limits
      - id: exit-code-fourteen-browser-error
        description: Exit 14 = browser launch or automation error
      - id: error-json-structure
        description: >
          Error JSON includes error, parameter, hint, and message fields
      - id: missing-param-error
        description: >
          Missing required params output JSON with error: "missing_parameter"

  - id: auto-discovery
    name: "Spec Auto-Discovery"
    behaviors:
      - id: auto-discovery-patterns
        description: >
          Searches spec.yaml, spec.yml, *.spec.yaml in cwd
      - id: auto-discovery-logs
        description: >
          Logs "Using auto-discovered spec: <path>" to stderr
      - id: auto-discovery-applied-to
        description: >
          Applies to: lint, verify, review
