<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Specify CLI — Specify</title>
<style>

:root {
  --bg: #0d1117;
  --bg-surface: #161b22;
  --bg-hover: #1c2128;
  --border: #30363d;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --text-dim: #6e7681;
  --accent: #58a6ff;
  --green: #3fb950;
  --red: #f85149;
  --yellow: #d29922;
  --orange: #db6d28;
  --sidebar-w: 260px;
  --detail-w: 380px;
  --header-h: 56px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
}

#app { min-height: 100vh; display: flex; flex-direction: column; }

/* Header */
#header {
  height: var(--header-h);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: var(--bg-surface);
  position: sticky; top: 0; z-index: 10;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-left h1 { font-size: 18px; font-weight: 600; }
.header-right { display: flex; align-items: center; gap: 16px; }

/* Toggle */
.toggle-group {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}
.toggle-btn {
  background: transparent;
  border: none;
  color: var(--text-muted);
  padding: 6px 14px;
  cursor: pointer;
  font-size: 13px;
  transition: background 0.15s, color 0.15s;
}
.toggle-btn:hover { background: var(--bg-hover); }
.toggle-btn.active { background: var(--accent); color: #fff; }

/* Badges */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 500;
}
.badge-pass { background: rgba(63,185,80,0.15); color: var(--green); }
.badge-fail { background: rgba(248,81,73,0.15); color: var(--red); }
.badge-untested { background: rgba(110,118,129,0.15); color: var(--text-dim); }
.badge-neutral { background: rgba(88,166,255,0.15); color: var(--accent); }
.badge-warn { background: rgba(210,153,34,0.15); color: var(--yellow); }

#summary-badges { display: flex; gap: 8px; }

/* Layout */
#layout {
  display: flex;
  flex: 1;
  height: calc(100vh - var(--header-h));
}

/* Sidebar */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px 0;
  background: var(--bg-surface);
}

.toc-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 16px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-muted);
  text-decoration: none;
  transition: background 0.1s;
  border-left: 2px solid transparent;
}
.toc-item:hover { background: var(--bg-hover); color: var(--text); }
.toc-item.active { border-left-color: var(--accent); color: var(--text); background: var(--bg-hover); }
.toc-item.depth-1 { padding-left: 16px; font-weight: 600; }
.toc-item.depth-2 { padding-left: 32px; }
.toc-item.depth-3 { padding-left: 48px; font-size: 12px; }

.toc-status {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.toc-status.pass { background: var(--green); }
.toc-status.fail { background: var(--red); }
.toc-status.untested { background: var(--text-dim); }
.toc-status.mixed { background: var(--yellow); }

/* Main content */
#content {
  flex: 1;
  overflow-y: auto;
  padding: 32px 48px;
  max-width: 900px;
}

.section {
  margin-bottom: 32px;
  padding: 20px 24px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg-surface);
  cursor: pointer;
  transition: border-color 0.15s;
}
.section:hover { border-color: var(--accent); }
.section.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.section-header h2 { font-size: 18px; font-weight: 600; }
.section-header h3 { font-size: 15px; font-weight: 600; }
.section-badges { display: flex; gap: 6px; }

.section-body { color: var(--text-muted); font-size: 14px; }
.section-body p { margin-bottom: 8px; }
.section-refs {
  margin-top: 8px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.ref-tag {
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
  background: rgba(88,166,255,0.1);
  color: var(--accent);
  font-family: 'SFMono-Regular', Consolas, monospace;
}
.ref-tag.stale {
  background: rgba(248,81,73,0.15);
  color: var(--red);
  text-decoration: line-through;
}

/* Spec view */
#spec-view {
  font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  font-size: 13px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
  padding: 20px 24px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
}

/* Detail panel */
#detail-panel {
  width: var(--detail-w);
  min-width: var(--detail-w);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  background: var(--bg-surface);
  padding: 16px;
}
#detail-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
#detail-header h3 { font-size: 15px; }
.close-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 20px;
  cursor: pointer;
  padding: 4px 8px;
}
.close-btn:hover { color: var(--text); }

.assertion-item {
  padding: 8px 12px;
  margin-bottom: 6px;
  border-radius: 6px;
  border: 1px solid var(--border);
  font-size: 13px;
}
.assertion-item.pass { border-left: 3px solid var(--green); }
.assertion-item.fail { border-left: 3px solid var(--red); }
.assertion-item.untested { border-left: 3px solid var(--text-dim); }

.assertion-type {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}
.assertion-desc { color: var(--text); }
.assertion-detail {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
  font-family: 'SFMono-Regular', Consolas, monospace;
}

.detail-section {
  margin-bottom: 16px;
}
.detail-section-title {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.hidden { display: none !important; }

/* Sync warnings */
.sync-warn {
  padding: 8px 12px;
  margin-bottom: 8px;
  border-radius: 6px;
  background: rgba(210,153,34,0.1);
  border: 1px solid rgba(210,153,34,0.3);
  font-size: 13px;
  color: var(--yellow);
}

/* Responsive */
@media (max-width: 900px) {
  #sidebar { display: none; }
  #content { padding: 16px; }
  #detail-panel { position: fixed; right: 0; top: var(--header-h); bottom: 0; z-index: 20; box-shadow: -4px 0 12px rgba(0,0,0,0.4); }
}

</style>
</head>
<body>
<div id="app">
  <header id="header">
    <div class="header-left">
      <h1 id="spec-title"></h1>
      <span id="spec-version" class="badge badge-neutral"></span>
    </div>
    <div class="header-right">
      <div class="toggle-group">
        <button id="btn-narrative" class="toggle-btn active" onclick="setView('narrative')">Narrative</button>
        <button id="btn-spec" class="toggle-btn" onclick="setView('spec')">Spec</button>
      </div>
      <div id="summary-badges"></div>
    </div>
  </header>
  <div id="layout">
    <nav id="sidebar">
      <div id="toc"></div>
    </nav>
    <main id="content">
      <div id="narrative-view"></div>
      <div id="spec-view" class="hidden"></div>
    </main>
    <aside id="detail-panel" class="hidden">
      <div id="detail-header">
        <h3 id="detail-title"></h3>
        <button onclick="closeDetail()" class="close-btn">&times;</button>
      </div>
      <div id="detail-body"></div>
    </aside>
  </div>
</div>
<script>
// Embedded data
const DATA = {
  "spec": {
    "version": "1.0",
    "name": "Specify CLI",
    "description": "Complete behavioral contract for Specify, a deterministic CLI tool for spec-driven functional verification of web applications. Specify follows an agent-first design: structured JSON goes to stdout for machine consumption, human-readable messages go to stderr, and meaningful exit codes enable branching without parsing. The CLI uses a noun-verb command pattern (e.g., spec validate, cli run, report diff) and provides schema introspection so agents can discover capabilities at runtime. This spec serves as both (1) a mechanically verifiable test suite executed by `specify verify cli`, and (2) a set of behavioral requirements that guide agents to validate properties requiring judgment. The tool itself is fully deterministic — no API keys, no LLM calls — intelligence comes from the agent layer that drives it.\n",
    "narrative_path": "specify.spec.narrative.md",
    "requirements": [
      {
        "id": "full-path-coverage",
        "description": "Every reachable path through the CLI has well-defined behavior captured in this spec. A \"path\" is a sequence of commands and subcommands that a user can follow — for example: specify human → Verify → Against captured data, specify capture --from code --input ..., specify verify cli --spec ....\n",
        "verification": "agent",
        "validation_plan": "1. Discover all command paths:\n   - Run `specify schema commands` to get the manifest\n   - Run `specify --help` and parse the command tree\n   - Explore interactive menus (human wizard) to find sub-paths\n   - Fuzz subcommands to discover hidden paths\n2. For each discovered path, search this spec for a test entry\n   whose args exercise that path\n3. Produce a coverage table: path → test ID (or \"MISSING\")\n4. Verify the table is internally consistent (no duplicate IDs\n   used for different paths, no test IDs that don't exist)\n5. The assertion passes if every path maps to at least one test ID\n",
        "evidence_format": "A table of { path, test_id, status } entries where status is 'covered' or 'missing'"
      }
    ],
    "cli": {
      "binary": "./specify",
      "commands": [
        {
          "id": "no-args-self-description",
          "description": "When invoked with no arguments, Specify outputs a complete JSON manifest of all available commands, their parameters, and exit codes to stdout. This is the primary discovery mechanism for agents — they call the binary with no args to learn what it can do. The manifest must include every registered command with its name, description, and parameters array, so an agent can construct valid invocations without prior knowledge.\n",
          "args": [],
          "expected_exit_code": 0,
          "stdout_assertions": [
            {
              "type": "json_path",
              "path": "name",
              "value": "specify"
            },
            {
              "type": "json_path",
              "path": "version",
              "value": "0.1.0"
            },
            {
              "type": "json_schema",
              "description": "The self-description JSON object must contain top-level keys for name, version, the full commands array, global options, and exit codes so agents can fully understand the CLI contract",
              "schema": {
                "type": "object",
                "required": [
                  "name",
                  "version",
                  "commands",
                  "global_options",
                  "exit_codes"
                ]
              }
            },
            {
              "type": "json_schema",
              "description": "The commands array must list at least 26 entries (all registered commands), each with name, description, and parameters so agents know every available operation",
              "schema": {
                "type": "object",
                "properties": {
                  "commands": {
                    "type": "array",
                    "minItems": 26,
                    "items": {
                      "type": "object",
                      "required": [
                        "name",
                        "description",
                        "parameters"
                      ]
                    }
                  }
                }
              }
            },
            {
              "type": "text_contains",
              "description": "The spec validate command (offline validation of a spec against captured data) must appear in the manifest",
              "text": "spec validate"
            },
            {
              "type": "text_contains",
              "description": "The spec generate command (create a spec from captured traffic data) must appear in the manifest",
              "text": "spec generate"
            },
            {
              "type": "text_contains",
              "description": "The spec refine command (deprecated alias for spec evolve) must still appear in the manifest for backward compatibility",
              "text": "spec refine"
            },
            {
              "type": "text_contains",
              "description": "The spec evolve command (gap analysis and spec improvement suggestions) must appear in the manifest",
              "text": "spec evolve"
            },
            {
              "type": "text_contains",
              "description": "The spec import command (convert existing e2e tests into spec items) must appear in the manifest",
              "text": "spec import"
            },
            {
              "type": "text_contains",
              "description": "The spec export command (generate e2e test code from a spec) must appear in the manifest",
              "text": "spec export"
            },
            {
              "type": "text_contains",
              "description": "The spec sync command (bidirectional comparison between spec and existing tests) must appear in the manifest",
              "text": "spec sync"
            },
            {
              "type": "text_contains",
              "description": "The spec lint command (structural validation of a spec without captures) must appear in the manifest",
              "text": "spec lint"
            },
            {
              "type": "text_contains",
              "description": "The spec guide command (authoring guidance for LLM spec writers) must appear in the manifest",
              "text": "spec guide"
            },
            {
              "type": "text_contains",
              "description": "The agent run command (autonomous browser-driven verification against a live system) must appear in the manifest",
              "text": "agent run"
            },
            {
              "type": "text_contains",
              "description": "The cli run command (execute CLI-section tests defined in a spec) must appear in the manifest",
              "text": "cli run"
            },
            {
              "type": "text_contains",
              "description": "The report diff command (compare two gap reports to see what changed) must appear in the manifest",
              "text": "report diff"
            },
            {
              "type": "text_contains",
              "description": "The report stats command (statistical confidence from report history) must appear in the manifest",
              "text": "report stats"
            },
            {
              "type": "text_contains",
              "description": "The schema command (JSON Schema introspection for spec, report, or commands) must appear as a standalone command",
              "text": "\"name\": \"schema\""
            },
            {
              "type": "text_contains",
              "description": "The mcp command (Model Context Protocol server for LLM tool integration) must appear as a standalone command",
              "text": "\"name\": \"mcp\""
            },
            {
              "type": "text_contains",
              "description": "The human command (interactive wizard that detects project state and guides the user) must appear as a standalone command",
              "text": "\"name\": \"human\""
            },
            {
              "type": "text_contains",
              "description": "The human shell subcommand (interactive REPL for iterative spec development) must appear in the manifest",
              "text": "human shell"
            },
            {
              "type": "text_contains",
              "description": "The human watch subcommand (live TUI dashboard for monitoring agent runs) must appear in the manifest",
              "text": "human watch"
            },
            {
              "type": "text_contains",
              "description": "The capture command (record a contract from a live system or codebase) must appear as a standalone command",
              "text": "\"name\": \"capture\""
            },
            {
              "type": "text_contains",
              "description": "The top-level evolve alias (convenience shortcut that delegates to spec evolve) must appear as a standalone command",
              "text": "\"name\": \"evolve\""
            },
            {
              "type": "text_contains",
              "description": "The top-level verify alias (unified verification dispatcher for data, agent, or CLI modes) must appear as a standalone command",
              "text": "\"name\": \"verify\""
            },
            {
              "type": "text_contains",
              "description": "The verify cli subcommand (explicit path to CLI test runner) must appear in the manifest",
              "text": "verify cli"
            },
            {
              "type": "text_contains",
              "description": "The top-level lint alias (convenience shortcut that delegates to spec lint) must appear as a standalone command",
              "text": "\"name\": \"lint\""
            },
            {
              "type": "text_contains",
              "description": "The bootstrap command (scaffold specify-driven development workflow with CLAUDE.md and git hooks) must appear as a standalone command",
              "text": "\"name\": \"bootstrap\""
            }
          ]
        },
        {
          "id": "help-flag",
          "description": "When invoked with --help, Specify prints human-readable usage information to stderr (not stdout, which is reserved for structured data). The help text must show the five primary lifecycle flows (Create, Capture, Evolve, Review, Verify) and the interactive human mode, giving users a clear mental model of the tool's workflow.\n",
          "args": [
            "--help"
          ],
          "expected_exit_code": 0,
          "stderr_assertions": [
            {
              "type": "text_contains",
              "text": "Usage: specify"
            },
            {
              "type": "text_contains",
              "description": "The help output organizes commands under a 'Primary Flows' heading to communicate the intended lifecycle",
              "text": "Primary Flows"
            },
            {
              "type": "text_contains",
              "text": "create"
            },
            {
              "type": "text_contains",
              "text": "capture"
            },
            {
              "type": "text_contains",
              "text": "evolve"
            },
            {
              "type": "text_contains",
              "text": "review"
            },
            {
              "type": "text_contains",
              "text": "verify"
            },
            {
              "type": "text_contains",
              "description": "The interactive human mode is mentioned in help so users know they can get guided assistance",
              "text": "human"
            }
          ]
        },
        {
          "id": "schema-commands",
          "description": "The schema commands subcommand outputs the full command manifest as a JSON array, where each entry describes a command's name, description, and parameter definitions. Agents use this to discover available operations and construct valid invocations programmatically, without needing to parse help text.\n",
          "args": [
            "schema",
            "commands"
          ],
          "expected_exit_code": 0,
          "stdout_assertions": [
            {
              "type": "json_schema",
              "description": "Returns a JSON array of at least 10 command objects, each with name, description, and parameters fields that an agent needs to construct valid CLI calls",
              "schema": {
                "type": "array",
                "minItems": 10,
                "items": {
                  "type": "object",
                  "required": [
                    "name",
                    "description",
                    "parameters"
                  ]
                }
              }
            }
          ]
        },
        {
          "id": "schema-spec",
          "description": "The schema spec subcommand outputs the JSON Schema that defines the structure of a Specify spec file. Agents and editors use this to validate spec files, provide autocomplete, and understand what fields are available when authoring specs.\n",
          "args": [
            "schema",
            "spec"
          ],
          "expected_exit_code": 0,
          "stdout_assertions": [
            {
              "type": "json_path",
              "path": "type",
              "value": "object"
            },
            {
              "type": "json_schema",
              "description": "The output is a valid JSON Schema document with type and properties, suitable for spec file validation",
              "schema": {
                "type": "object",
                "required": [
                  "type",
                  "properties"
                ]
              }
            }
          ]
        },
        {
          "id": "schema-report",
          "description": "The schema report subcommand outputs the JSON Schema that defines the structure of a Specify gap report (the output of spec validate). Agents use this to understand and programmatically process validation results.\n",
          "args": [
            "schema",
            "report"
          ],
          "expected_exit_code": 0,
          "stdout_assertions": [
            {
              "type": "json_schema",
              "schema": {
                "type": "object",
                "required": [
                  "type",
                  "properties"
                ]
              }
            }
          ]
        },
        {
          "id": "unknown-command",
          "description": "When an unrecognized command is given, Specify returns exit code 10 (parse_error) and outputs a structured JSON error to stdout containing the error type, the unrecognized command string, and a hint directing the user to schema commands for the valid command list. This enables agents to detect and recover from typos or outdated command names programmatically.\n",
          "args": [
            "foo",
            "bar"
          ],
          "expected_exit_code": 10,
          "stdout_assertions": [
            {
              "type": "json_path",
              "path": "error",
              "value": "unknown_command"
            },
            {
              "type": "json_path",
              "path": "command",
              "value": "foo bar"
            },
            {
              "type": "text_contains",
              "text": "hint"
            }
          ]
        },
        {
          "id": "missing-spec-file",
          "description": "When spec validate is called with a --spec path that does not exist on disk, the command fails with exit code 10 (parse_error) and prints both \"Failed to load spec\" and \"Spec file not found\" to stderr. This validates early failure with a clear, actionable error message rather than a cryptic stack trace.\n",
          "args": [
            "spec",
            "validate",
            "--spec",
            "nonexistent-file-that-does-not-exist.yaml",
            "--capture",
            "."
          ],
          "expected_exit_code": 10,
          "stderr_assertions": [
            {
              "type": "text_contains",
              "text": "Failed to load spec"
            },
            {
              "type": "text_contains",
              "text": "Spec file not found"
            }
          ]
        },
        {
          "id": "missing-export-framework",
          "description": "When spec export is called with an empty --framework argument, the command fails with exit code 10 and reports \"Unsupported framework\" to stderr, listing the valid options (playwright, cypress). This prevents silent failure and guides the user to provide a valid framework.\n",
          "args": [
            "spec",
            "export",
            "--spec",
            "src/spec/examples/login-page.yaml",
            "--framework",
            ""
          ],
          "expected_exit_code": 10,
          "stderr_assertions": [
            {
              "type": "text_contains",
              "text": "Unsupported framework"
            },
            {
              "type": "text_contains",
              "text": "playwright"
            }
          ]
        },
        {
          "id": "export-playwright",
          "description": "The spec export command transforms a spec file into runnable Playwright test code. Given a spec and --framework playwright, it outputs a JSON array of generated test files, each containing a filePath, the generated test code content, and the framework identifier. The generated code must import from @playwright/test. This is a fully deterministic code generation step — no browser or network access needed.\n",
          "args": [
            "spec",
            "export",
            "--spec",
            "src/spec/examples/login-page.yaml",
            "--framework",
            "playwright",
            "--json"
          ],
          "expected_exit_code": 0,
          "stdout_assertions": [
            {
              "type": "json_schema",
              "description": "Output is a JSON array of file objects, each with filePath (where to write), content (the generated test code), and framework (which framework was targeted)",
              "schema": {
                "type": "array",
                "minItems": 1,
                "items": {
                  "type": "object",
                  "required": [
                    "filePath",
                    "content",
                    "framework"
                  ]
                }
              }
            },
            {
              "type": "text_contains",
              "text": "playwright"
            },
            {
              "type": "text_contains",
              "description": "The generated Playwright test code imports from @playwright/test, confirming it produces valid Playwright syntax",
              "text": "@playwright/test"
            }
          ]
        },

  "narrative": {
    "title": "Specify",
    "overview": "Specify is a behavioral contract tool for web applications and CLIs. It creates a formal, computable description of how a system should behave, then provides deterministic tools to verify that the implementation matches the description.\n\nThe core design decision is a separation of concerns: the tool stays fully deterministic. There are no API keys, no `--llm` flags, no probabilistic outputs. Intelligence comes from the agent layer -- an LLM using Specify through its CLI, MCP server, or structured JSON output. Specify computes facts and produces structured data. Agents interpret those facts, make decisions, and drive the workflow.\n\nA spec should be complete enough that an agent can implement and validate an entire system from it. This is the standard: if someone hands an agent a Specify spec and nothing else, the agent should be able to build the system, verify it works, and know exactly where it falls short.\n\nThe tool is designed for three audiences simultaneously. Humans read the narrative companion and review the interactive HTML browser. Agents consume structured JSON from stdout, use meaningful exit codes for branching, and discover capabilities through schema introspection. CI/CD pipelines run the deterministic CLI directly and gate on exit codes.",
    "sections": [
      {
        "title": "The Lifecycle",
        "body": "Specify organizes around five primary flows. Each flow corresponds to a stage in the lifecycle of a behavioral contract. The `--help` output presents them in this order, the interactive wizard (`specify human`) offers them as the top-level menu, and each is available as a top-level command.",
        "specRefs": [
          "meta"
        ],
        "children": [
          {
            "title": "Create",
            "body": "Creating a spec from nothing. `specify create` starts an interactive interview that captures human intent and produces two artifacts: a YAML spec file and a Markdown narrative companion.\n\nThe interview is context-aware. It detects the current project state -- existing specs, capture directories, test files, e2e framework configuration -- and adapts its questions accordingly. If a project already has Playwright tests, the wizard offers to import them. If there are capture directories with `traffic.json` files, it offers to load pages from captured data.\n\nThe interview covers identity (name, base URL, description), page discovery (manual entry or crawling), and default properties (no 5xx responses, no console errors). The result is a spec that immediately works with `specify lint` and `specify verify`.\n\nFor agents, `create` is less relevant -- agents typically start from `capture` or `evolve`. But for humans starting a greenfield project, it provides a structured way to express intent before writing any code.\n\n```\n$ specify create\n$ specify create --output my-app.spec.yaml\n```",
            "specRefs": [
              "cli:create-in-schema"
            ],
            "children": []
          },
          {
            "title": "Capture",
            "body": "Deriving a behavioral contract from an existing system. Capture has two modes, selected via `--from`:\n\n**From a live URL** (`--from live`, the default): Specify launches a browser, navigates to the target URL, and records everything -- network traffic, console output, screenshots, DOM snapshots. The captured data lands in an output directory as structured JSON. By default, Specify then generates a spec from the captured data automatically. Use `--no-generate` to capture data without generating a spec.\n\n```\n$ specify capture --url http://localhost:3000 --output ./captures/my-app\n$ specify capture --url https://example.com --output ./cap --no-generate\n```\n\n**From existing test code** (`--from code`): Specify analyzes existing Playwright or Cypress test files and imports them as spec items. It auto-detects the framework from configuration files or accepts an explicit `--framework` flag. This is useful when a project already has e2e tests and wants to layer Specify's contract model on top of them.\n\n```\n$ specify capture --from code --input ./tests --output spec.yaml\n```\n\nCapture validates its inputs early. An empty `--url` returns a structured `missing_parameter` error. An invalid URL returns an `invalid_url` error. These are not silent failures -- they produce JSON with error type, parameter name, and hint text, so agents can recover programmatically.",
            "specRefs": [
              "cli:capture-no-url",
              "cli:capture-invalid-url",
              "cli:capture-from-code-missing"
            ],
            "children": []
          },
          {
            "title": "Evolve",
            "body": "Changing a contract as the product changes. Evolve is the thinking step -- it guides reasoning about what the contract should say, without making deterministic assertions about correctness.\n\nEvolve operates in three modes:\n\n**Interactive** (default, no flags): Analyzes the current spec for structural gaps and produces prioritized suggestions. Each suggestion has a category (`new_coverage`, `add_scenario`, `add_assertion`, `spec_hygiene`, etc.), a priority level, a rationale explaining why the change matters, a proposed spec fragment, and a question for the agent to ask the user.\n\n```\n$ specify evolve --spec spec.yaml\n$ specify spec evolve --spec spec.yaml --json\n```\n\nFor example, running evolve against the login page example spec finds that the `failed-login` scenario has interactions but no assertions verifying the outcome. That is a real gap -- the scenario clicks the submit button but never checks what happens. Evolve surfaces this as a suggestion with a concrete proposed change.\n\nRunning evolve against the self-spec (`specify.spec.yaml`) produces a summary showing the full command count and suggestions for improving coverage.\n\n**PR-based** (`--pr`): Analyzes a pull request diff to identify which parts of the spec are affected by the code changes. This mode accepts a PR number or URL and optionally a `--repo` flag for disambiguation.\n\n```\n$ specify evolve --spec spec.yaml --pr 42\n$ specify evolve --spec spec.yaml --pr https://github.com/org/repo/pull/42\n```\n\n**Report-based** (`--report`): Analyzes a gap report from a previous validation run and suggests spec refinements based on failures and coverage gaps.\n\n```\n$ specify evolve --spec spec.yaml --report gap-report.json\n$ specify evolve --spec spec.yaml --report gap-report.json --output refined.yaml\n```\n\nThe `--apply` flag enters an interactive mode where the agent walks through suggestions one by one, optionally applying them to produce a refined spec. Combined with `--url`, it can crawl a live system for additional context.\n\nAn important design boundary: `evolve` guides reasoning. It does not compute facts about the spec's structural validity (that is `lint`'s job). Do not confuse them. Lint tells you \"this ID is duplicated\" or \"this flow references a nonexistent page.\" Evolve tells you \"this scenario has no assertions -- consider adding one.\" Both are valuable, but they serve different purposes and should not be merged.",
            "specRefs": [
              "cli:evolve-interactive",
              "cli:evolve-finds-gaps",
              "cli:evolve-no-pr-flag-ok",
              "cli:evolve-self-spec-finds-cli-gaps",
              "cli:evolve-top-level"
            ],
            "children": []
          },
          {
            "title": "Review",
            "body": "Inspecting the contract. `specify review` generates a self-contained HTML file and opens it in the default browser. The HTML embeds all data (spec, narrative, validation reports) and uses vanilla JavaScript for interactivity -- no external dependencies at runtime.\n\nThe review interface has three panels:\n\n- **Sidebar**: A table of contents with status indicators. Each item shows a colored dot -- green for passed, red for failed, yellow for mixed results, gray for untested, orange for stale references.\n\n\n- **Detail panel**: Clicking any section reveals its linked validation results -- CLI command outcomes, visual assertion results, request matching status, scenario step results. Each assertion shows its type, description, and pass/fail status.\n\nThe review tool resolves `narrative_path` relative to the spec file's directory, not the current working directory. This matters for nested project structures where the spec and narrative live in subdirectories.\n\n```\n$ specify review --spec spec.yaml\n$ specify review --spec spec.yaml --report gap-report.json\n$ specify review --spec spec.yaml --no-open\n```\n\nWhen a narrative companion exists (pointed to by `narrative_path` in the spec), the review HTML includes prose alongside the structural data. When no narrative exists, the review builds sections from the spec structure itself -- pages become sections, scenarios become subsections.",
            "specRefs": [
              "cli:review-generates-html",
              "cli:review-no-spec",
              "cli:review-missing-spec-file",
              "page:login",
              "page:old-login"
            ],
            "children": []
          },
          {
            "title": "Verify",
            "body": "Checking that an implementation matches the contract. Verify is the assertion engine -- it produces pass/fail results with evidence.\n\nVerify auto-detects its mode from the spec content and the flags provided:\n\n**CLI verification** (`verify cli` or auto-detected when spec has a `cli` section): Runs each command defined in the spec's `cli.commands` array, checks exit codes, and evaluates stdout/stderr assertions. This is fully deterministic -- the tool executes the binary, captures output, and compares against the spec.\n\n```\n$ specify verify cli --spec spec.yaml\n$ specify verify --spec spec.yaml   # auto-detects cli section\n```\n\n**Agent verification** (`verify --url`): Launches a browser against a live URL and runs autonomous agent-driven verification. The agent navigates pages, executes scenarios, checks visual assertions, and validates network requests.\n\n```\n$ specify verify --spec spec.yaml --url http://localhost:3000\n```\n\n**Data validation** (`verify --capture`): Validates a spec against previously captured data (offline, no browser needed). Useful for CI/CD where browser access may not be available.\n\n```\n$ specify verify --spec spec.yaml --capture ./captures/latest\n```\n\nThe routing logic is explicit: `--url` without `--capture` routes to agent verification. `--capture` routes to data validation. Neither flag routes to auto-detection from the spec. If the spec has a `cli` section, it runs CLI verification. If it has pages but no target, it tells you to provide one.\n\nExit codes encode the result: `0` for all passed, `1` for assertion failures, `2` for all untested, `10` for parse errors, `14` for browser errors. These are designed for agent branching -- an agent can check the exit code and decide its next action without parsing output.",
            "specRefs": [
              "cli:verify-auto-detects-cli",
              "cli:verify-requirements-fail-not-untested",
              "cli:verify-cli-top-level",
              "cli:verify-capture-top-level",
              "cli:verify-url-no-browser"
            ],
            "children": []
          }
        ]
      },
      {
        "title": "The Spec Format",
        "body": "A Specify spec is a YAML (or JSON) document that describes behavioral expectations. The format is designed to be both human-readable and machine-verifiable.",
        "specRefs": [
          "cli:lint-valid-spec",
          "cli:lint-self-spec",
          "cli:schema-spec"
        ],
        "children": [
          {
            "title": "Identity",
            "body": "Every spec starts with identity fields:\n\n```yaml\nversion: \"1.0\"\nname: \"Login Page Spec\"\ndescription: \"Simple login page with form submission and redirect\"\n```\n\n`version` is the spec format version. `name` is human-readable, used in review output and reports. `description` explains what the spec covers.",
            "specRefs": [],
            "children": []
          },
          {
            "title": "Pages",
            "body": "Pages describe individual views in the application. Each page has an `id` (used for cross-referencing), a `path` (URL path or pattern), and optional assertions:\n\n```yaml\npages:\n  - id: login\n    path: /login\n    title: \"Login\"\n\n    visual_assertions:\n      - type: element_exists\n        selector: \"form\"\n        description: \"Login form is present\"\n      - type: text_contains\n        selector: \"button[type=submit]\"\n        text: \"Log In\"\n\n    console_expectations:\n      - level: error\n        count: 0\n\n    expected_requests:\n      - method: POST\n        url_pattern: \"/api/auth/login\"\n        response:\n          status: 200\n\n    scenarios:\n      - id: successful-login\n        steps:\n          - action: fill\n            selector: \"#email\"\n            value: \"{{test_user.email}}\"\n          - action: click\n            selector: \"button[type=submit]\"\n          - action: wait_for_navigation\n            url_pattern: \"/dashboard\"\n```\n\nVisual assertions check what a user sees: `element_exists`, `text_contains`, `text_matches`, `screenshot_region`, `element_count`. Each can carry a `quantifier` (`always` or `sometimes`) and a `confidence` level (`observed`, `inferred`, `reviewed`).\n\nExpected requests check network behavior: what HTTP calls should happen when a page loads or an action is performed. Requests can assert on method, URL pattern (exact, glob, or regex), request body shape, and response properties.\n\nConsole expectations check browser console output: no errors, specific warning patterns, expected log messages.\n\nScenarios describe interactive workflows within a single page. Steps include `click`, `fill`, `select`, `hover`, `keypress`, `scroll`, `wait`, `wait_for_request`, `wait_for_navigation`, `assert_visible`, `assert_text`, and `assert_not_visible`.",
            "specRefs": [
              "cli:validate-with-empty-capture"
            ],
            "children": []
          },
          {
            "title": "Flows",
            "body": "Flows describe multi-page user journeys -- sequences of navigation and interaction that span multiple pages:\n\n```yaml\nflows:\n  - id: login-to-dashboard\n    description: \"User logs in and sees the dashboard\"\n    steps:\n      - navigate: \"/login\"\n      - assert_page: login\n      - action: fill\n        selector: \"#email\"\n        value: \"{{test_user.email}}\"\n      - action: click\n        selector: \"button[type=submit]\"\n      - navigate: \"/dashboard\"\n      - assert_page: dashboard\n```\n\nFlow steps come in three types:\n\n- **Navigate**: Go to a URL path. Supports `{{var}}` templates for portability.\n- **Assert page**: Verify the current page matches a page spec by `id`. This runs all of that page's visual assertions, console expectations, and expected request checks.\n- **Action**: Perform an interaction (same step types as scenarios -- click, fill, hover, etc.).\n\nFlow steps reference pages by their `id` via `assert_page`, creating a compositional structure where page-level assertions are reused in flow-level verification. A page defined once can be asserted in multiple flows, and changes to the page spec automatically propagate to every flow that references it.\n\nWhen exported to test code via `specify spec export`, multi-page flows produce multi-step tests with `page.goto` calls for navigation and `page.locator` calls for interactions. The generated code preserves the flow structure, making it readable and debuggable.",
            "specRefs": [
              "cli:export-multi-page-flow"
            ],
            "children": []
          },
          {
            "title": "CLI",
            "body": "The `cli` section defines command-line verification. It specifies a binary to invoke and a set of commands with expected behavior:\n\n```yaml\ncli:\n  binary: \"./specify\"\n  commands:\n    - id: help-flag\n      args: [\"--help\"]\n      expected_exit_code: 0\n      stderr_assertions:\n        - type: text_contains\n          text: \"Usage: specify\"\n```\n\nEach command specifies `args` (the argument array), `expected_exit_code`, and assertions on `stdout` and `stderr`. Assertion types include `text_contains`, `text_matches`, `json_schema`, `json_path`, `empty`, and `line_count`.\n\nMulti-command scenarios allow sequential commands with shared state:\n\n```yaml\ncli:\n  scenarios:\n    - id: schema-round-trip\n      steps:\n        - id: get-schema\n          args: [\"schema\", \"spec\"]\n          expected_exit_code: 0\n        - id: get-commands\n          args: [\"schema\", \"commands\"]\n          expected_exit_code: 0\n```",
            "specRefs": [
              "cli:cli-run-no-cli-section"
            ],
            "children": []
          },
          {
            "title": "Requirements",
            "body": "Requirements describe behavioral properties that need agent intelligence to validate. They cannot be checked by exit codes or string matching alone:\n\n```yaml\nrequirements:\n  - id: full-path-coverage\n    description: \"Every reachable path through the CLI has well-defined behavior\"\n    verification: agent\n    validation_plan: |\n      1. Discover all command paths\n      2. For each path, search the spec for a test entry\n      3. Produce a coverage table\n    evidence_format: \"A table of { path, test_id, status } entries\"\n```\n\nEach requirement has a `validation_plan` that tells an agent exactly how to verify it, and an `evidence_format` that specifies the structure of the evidence the agent should produce. This is not a suggestion -- it is a contract with the agent.",
            "specRefs": [
              "cli:verify-requirements-fail-not-untested"
            ],
            "children": []
          },
          {
            "title": "Variables",
            "body": "Template variables make specs portable across environments:\n\n```yaml\nvariables:\n  base_url: \"${TARGET_BASE_URL}\"\n  test_user:\n    email: \"test@example.com\"\n    password: \"secret123\"\n```\n\nVariables use two template syntaxes:\n\n- `{{var}}` for spec-level variables: `{{base_url}}`, `{{test_user.email}}`. These are defined in the spec's `variables` section and expanded at verification time.\n- `${ENV_VAR}` for environment variable expansion: `${TARGET_BASE_URL}`, `${API_KEY}`. These are read from the process environment.\n\nThis dual syntax allows the same spec to run against localhost in development and a staging URL in CI/CD. The spec defines the variable names, the environment provides the values. An agent running verification in CI sets environment variables; a human running locally uses different values.",
            "specRefs": [],
            "children": []
          },
          {
            "title": "Defaults",
            "body": "Universal properties that apply to all pages unless overridden:\n\n```yaml\ndefaults:\n  no_5xx: true\n  no_console_errors: true\n  page_load_timeout_ms: 10000\n```\n\nThese are safety nets. `no_5xx` means no HTTP response should return a 5xx status code. `no_console_errors` means no `console.error` messages should appear. They apply globally and save you from adding the same assertions to every page.",
            "specRefs": [],
            "children": []
          },
          {
            "title": "Assumptions",
            "body": "Preconditions that must hold for the spec to be validly tested:\n\n```yaml\nassumptions:\n  - type: url_reachable\n    url: \"{{base_url}}\"\n    description: \"Target application must be running\"\n  - type: env_var_set\n    name: \"TARGET_BASE_URL\"\n```\n\nAssumption types include `url_reachable` (URL responds with 2xx), `env_var_set` (environment variable is non-empty), `api_returns` (endpoint returns expected status), and `selector_exists` (CSS selector exists on a page). Failed assumptions produce exit code `13`, distinct from assertion failures (`1`), so agents know the test environment was not valid.",
            "specRefs": [],
            "children": []
          },
          {
            "title": "Narrative Path",
            "body": "The `narrative_path` field points to the companion narrative document:\n\n```yaml\nnarrative_path: \"specify.spec.narrative.md\"\n```\n\nThis path is resolved relative to the spec file's directory. When present, `specify lint` validates that the narrative references match actual spec items. `specify review` loads the narrative and renders it alongside the spec structure.",
            "specRefs": [],
            "children": []
          }
        ]
      },
      {
        "title": "Verification Model",
        "body": "Specify uses two distinct verification mechanisms, and they are not interchangeable.",
        "specRefs": [],
        "children": [
          {
            "title": "Mechanical Assertions",
            "body": "These are deterministic checks that the tool evaluates directly:\n\n- **Exit codes**: The command exited with the expected code.\n- **json_path**: A specific JSON path in the output has a specific value (e.g., `path: \"error\"`, `value: \"unknown_command\"`).\n- **json_schema**: The output is valid JSON conforming to a JSON Schema (e.g., the output is an array of objects with `name`, `description`, and `parameters` fields).\n- **text_contains**: The output contains a specific substring.\n- **text_matches**: The output matches a regex pattern.\n- **element_exists**: A CSS selector matches at least one DOM element.\n- **element_count**: The count of matching elements is within bounds.\n\nThese are checked by `verify cli` for CLI specs, and by `verify --url` or `verify --capture` for page specs. No judgment is needed. The tool compares expected against actual and reports pass or fail.",
            "specRefs": [],
            "children": []
          },
          {
            "title": "Behavioral Requirements",
            "body": "These are properties that need agent intelligence to validate. The classic example from the self-spec: \"Every reachable path through the CLI has well-defined behavior captured in this spec.\"\n\nNo deterministic check can verify this. An agent needs to:\n1. Discover all command paths (via schema introspection, help parsing, fuzzing)\n2. Map each path to a test entry in the spec\n3. Produce evidence that the mapping is complete\n\nAgents validate behavioral requirements and write evidence files to `.specify/evidence/<requirement-id>.json`. When `verify` runs, it reads evidence files and marks requirements as passed (evidence exists and validates) or failed (no evidence).",
            "specRefs": [],
            "children": []
          },
          {
            "title": "No \"Untested\" State",
            "body": "This is a deliberate design decision. In the verification model, everything is either passed or failed. If a behavioral requirement has no evidence, it is a failure -- not \"untested.\" This matters because \"untested\" creates a gray zone where requirements can slip through indefinitely. Making it a failure forces action: either verify the requirement or remove it from the spec.\n\nThe `summary.untested` field in reports exists for mechanical assertions that could not be evaluated (e.g., a page that was not captured). But behavioral requirements are always either verified or failed.",
            "specRefs": [],
            "children": []
          }
        ]
      },
      {
        "title": "Agent Integration",
        "body": "Specify is built for agent consumption. Every design decision reflects this.",
        "specRefs": [
          "cli:no-args-self-description",
          "cli:schema-commands",
          "cli:schema-commands-has-modes"
        ],
        "children": [
          {
            "title": "Self-Description",
            "body": "Running `specify` with no arguments produces a JSON self-description to stdout:\n\n```json\n{\n  \"name\": \"specify\",\n  \"version\": \"0.1.0\",\n  \"commands\": [...],\n  \"global_options\": [...],\n  \"exit_codes\": { \"0\": \"success\", \"1\": \"assertion_failure\", ... },\n  \"hint\": \"Run \\\"specify schema commands\\\" for full parameter schemas.\"\n}\n```\n\nThis is the entry point for any agent encountering Specify for the first time. The self-description includes the command list, global options, exit code meanings, and a hint pointing to deeper introspection.\n\nHuman-readable help goes to stderr via `--help`. JSON goes to stdout with no arguments. This split is intentional: agents pipe stdout, humans read stderr.",
            "specRefs": [],
            "children": []
          },
          {
            "title": "Schema Introspection",
            "body": "`specify schema` exposes three introspection targets:\n\n- `specify schema commands`: Returns the full command manifest -- every command with its parameters, types, required/optional status, defaults, modes, and examples. This is the same manifest used internally for routing and help generation.\n\n- `specify schema spec`: Returns the JSON Schema for spec documents. Agents use this to validate specs they generate or to understand what fields are available.\n\n- `specify schema report`: Returns the JSON Schema for validation reports. Agents use this to parse and reason about verification results.\n\nCommands with multiple modes (like `verify` and `capture`) include a `modes` array describing each mode's required parameters and activation condition. For example, `verify` has `data_validation` mode (requires `--spec` and `--capture`) and `agent_verification` mode (requires `--spec` and `--url`).",
            "specRefs": [
              "cli:schema-spec",
              "cli:schema-report"
            ],
            "children": []
          },
          {
            "title": "Subcommand Help",
            "body": "`specify <command> --help` shows command-specific help with parameters, modes, and examples. This is not a fallback to top-level help -- it is targeted information about the specific command.\n\nFor example, `specify verify --help` shows verify-specific parameters (`--spec`, `--capture`, `--url`, `--headed`), the two modes (`data_validation` and `agent_verification`), and concrete examples. `specify evolve --help` shows evolve-specific parameters (`--pr`, `--report`, `--apply`).\n\nThis matters for discoverability. An agent encountering `verify` for the first time can run `verify --help` and learn everything it needs to invoke the command correctly, including which parameter combinations activate which modes.",
            "specRefs": [
              "cli:subcommand-help-verify",
              "cli:subcommand-help-evolve"
            ],
            "children": []
          },
          {
            "title": "MCP Server",
            "body": "`specify mcp` starts a Model Context Protocol server that exposes Specify's capabilities as MCP tools. Any MCP-compatible client -- Claude Desktop, Cursor, Claude Code, or custom integrations -- can discover and invoke these tools.\n\nThe server supports two transports:\n\n- **stdio** (default): For local use. The MCP client spawns `specify mcp` as a subprocess.\n- **HTTP** (`--http`): For remote access. The server binds to a port and accepts MCP requests over HTTP.\n\n```json\n{\n  \"mcpServers\": {\n    \"specify\": { \"command\": \"specify\", \"args\": [\"mcp\"] }\n  }\n}\n```\n\n```json\n{\n  \"mcpServers\": {\n    \"specify\": { \"url\": \"http://host:8080/mcp\" }\n  }\n}\n```",
            "specRefs": [
              "cli:mcp-help"
            ],
            "children": []
          },
          {
            "title": "Evidence Loop",
            "body": "The evidence loop is how agents close the gap between behavioral requirements and verification:\n\n1. `verify` runs and identifies unverified behavioral requirements. It reports them as failures with a message like \"1 behavioral requirement(s) need agent verification.\"\n\n2. The agent reads the requirement's `validation_plan` and `evidence_format`.\n\n3. The agent executes the validation plan -- running commands, analyzing output, checking coverage.\n\n4. The agent writes evidence to `.specify/evidence/<requirement-id>.json` in the format specified by `evidence_format`.\n\n5. On the next `verify` run, Specify reads the evidence file and marks the requirement as passed or failed based on the evidence content.\n\nThis loop is asymmetric by design. The tool does not know how to validate behavioral requirements -- that requires judgment. The agent does not know what to validate -- that requires the spec. Together they form a complete verification system.",
            "specRefs": [],
            "children": []
          },
          {
            "title": "Structured Output and Exit Codes",
            "body": "Every command follows the same output contract:\n\n- **stdout**: Structured data (JSON by default). This is what agents parse.\n- **stderr**: Human-readable messages, progress indicators, summaries. This is what humans read.\n- **Exit codes**: Encode the result type for branching.\n\nExit codes are granular:\n\n| Code | Meaning |\n|------|---------|\n| 0 | Success |\n| 1 | Assertion failure (some tests failed) |\n| 2 | All untested (no assertions could be evaluated) |\n| 10 | Parse error (invalid spec, unknown command, missing parameter) |\n| 11 | Network error |\n| 12 | Timeout |\n| 13 | Assumption failure (preconditions not met) |\n| 14 | Browser error (Playwright not available) |\n\nAn agent can distinguish between \"the spec failed validation\" (1) and \"the spec file could not be parsed\" (10) and \"the target URL was unreachable\" (11) without ever reading the output.\n\nGlobal options control output format:\n\n- `--json`: Force JSON output (even in TTY contexts).\n- `--output-format <format>`: Choose between `json`, `text`, `markdown`, `ndjson`.\n- `--fields <field1,field2>`: Select specific fields from the output (context window discipline).\n- `--quiet`: Suppress non-essential stderr output.",
            "specRefs": [],
            "children": []
          }
        ]
      },
      {
        "title": "Error Handling",
        "body": "Errors are structured, not strings. An unknown command returns:\n\n```json\n{\n  \"error\": \"unknown_command\",\n  \"command\": \"foo bar\",\n  \"hint\": \"Run \\\"specify schema commands\\\" for available commands\"\n}\n```\n\nA missing parameter returns:\n\n```json\n{\n  \"error\": \"missing_parameter\",\n  \"parameter\": \"--url\",\n  \"hint\": \"Provide the URL to capture\"\n}\n```\n\nEach error includes an `error` type (for programmatic matching), context fields (which command, which parameter), and a `hint` (for recovery). The exit code is always `10` for parse/input errors.\n\nThis structure lets agents handle errors without string parsing. An agent can check `error === \"missing_parameter\"` and then provide the missing parameter, rather than trying to regex-match an error message.",
        "specRefs": [
          "cli:unknown-command",
          "cli:missing-spec-file",
          "cli:missing-export-framework"
        ],
        "children": []
      },
      {
        "title": "Spec Authoring Support",
        "body": "",
        "specRefs": [

        "children": [
          {
            "title": "Guide",
            "body": "`specify spec guide` outputs a comprehensive authoring guide for agents writing specs. It includes the JSON Schema, example specs, common patterns, assertion type documentation, template variable syntax, and tips. This is designed to be consumed by an agent's context window so it can write valid specs without trial and error.",

            "title": "Export",
            "body": "`specify spec export` converts a spec into runnable test code for Playwright or Cypress:\n\n```\n$ specify spec export --spec spec.yaml --framework playwright --json\n$ specify spec export --spec spec.yaml --framework cypress --json\n```\n\nThe generated code imports from the appropriate test framework, creates page objects from page specs, and translates scenarios and flows into test steps. Multi-page flows produce multi-step tests with `page.goto` and `page.locator` calls.\n\nExport is useful for teams transitioning to Specify from an existing test framework, or for generating a baseline test suite from a spec.",

            "title": "Import and Sync",
            "body": "`specify spec import` converts existing Playwright or Cypress tests into spec items. It analyzes test file structure, extracts page visits, selectors, assertions, and flows, and produces a spec.\n\n`specify spec sync` performs bidirectional comparison between a spec and existing tests. It identifies spec items not covered by tests, tests not reflected in the spec, and drift between the two. This is useful for maintaining alignment as the spec and tests evolve independently.",

        "title": "Lint",
        "body": "`specify lint` (or `specify spec lint`) validates spec structure without captures or a running system. It performs three levels of validation:\n\n1. **Parse**: Can the file be read as YAML or JSON?\n2. **Schema**: Does the structure conform to the spec JSON Schema?\n3. **Semantic**: Are IDs unique? Do flow `assert_page` references point to real pages? Are there empty step arrays? Are template variables defined but unused? Are there pages with no assertions at all?\n\n\nThe result is a structured `{ valid: boolean, errors: [...] }` object. Each error includes a JSON-pointer path, severity (`error` or `warning`), message, and rule identifier.\n\nLint computes facts. It does not suggest improvements (that is evolve's job) or verify behavior (that is verify's job). This boundary is deliberate. A tool that mixes structural validation with improvement suggestions creates confusion about what needs fixing versus what might be nice to add.",
        "specRefs": [

      {
        "title": "Interactive Mode",
        "body": "`specify human` enters an interactive mode designed for humans who want guidance through the lifecycle. The wizard detects project state and presents the five lifecycle flows as an arrow-key menu.\n\nEvery path through the wizard is directly addressable via command-line arguments:\n\n```\n$ specify human create\n$ specify human capture live\n$ specify human capture code\n$ specify human evolve interactive\n$ specify human evolve pr\n$ specify human evolve report\n$ specify human review\n$ specify human verify data\n$ specify human verify agent\n$ specify human verify cli\n$ specify human verify diff\n$ specify human verify stats\n```\n\nThis direct-path access matters for two reasons. First, it lets users skip the menu when they know what they want. Second, it makes every sub-path testable -- the self-spec exercises each path with expected output.\n\nTwo additional interactive modes complement the wizard:\n\n- `specify human shell`: A REPL for iterative spec development with tab completion. Useful for exploring and modifying specs interactively.\n\n- `specify human watch`: A live TUI dashboard for monitoring agent runs and spec status. Requires a TTY and reports an error when run without one.\n\nAll interactive modes exit gracefully when no TTY is available. This is important for CI/CD environments and automated testing where stdin is not connected to a terminal.",
        "specRefs": [
