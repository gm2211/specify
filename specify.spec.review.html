        ],
        "children": []
      },
      {
        "title": "Development Workflow",
        "body": "`specify bootstrap` sets up a specify-driven development workflow. It writes two files:\n\n1. **CLAUDE.md section**: Instructions for AI agents describing the red-green TDD workflow with Specify. The section is wrapped in marker comments (`<!-- specify-bootstrap -->`) for idempotent updates.\n\n2. **Git pre-commit hook**: A shell script that runs `specify lint` and `specify verify cli` before allowing commits. It finds the specify binary (checking `./specify` first, then `PATH`), runs both checks, and blocks the commit if either fails.\n\nThe workflow the bootstrap section teaches is:\n\n1. **Evolve** -- reason through what the contract should say. Run `specify evolve` for structural signals. Use judgment, not just tool output.\n\n2. **Write assertions first (RED)** -- update the spec with assertions that reflect intended behavior. They should fail against the current implementation.\n\n3. **Implement the change (GREEN)** -- write code to make the failing assertions pass.\n\n4. **Verify** -- run `specify lint` (structure valid?) then `specify verify cli` (assertions pass?).\n\n5. **Commit spec + code together** -- the contract and implementation travel as one unit.\n\nBootstrap is idempotent. Running it twice is safe -- it skips files that already have the specify section. It reports structured results showing what was created, updated, or skipped.\n\n```\n$ specify bootstrap\n$ specify bootstrap --dry-run\n$ specify bootstrap --target-dir ./my-project\n```",
        "specRefs": [
          "cli:bootstrap-dry-run",
          "cli:bootstrap-writes-files",
          "cli:bootstrap-idempotent"
        ],
        "children": [
          {
            "title": "Rules for Agents",
            "body": "The bootstrap instructions include explicit rules:\n\n- Never skip the evolve step, even for \"obvious\" changes.\n- If `verify cli` fails, fix the code -- not the spec (unless the spec is genuinely wrong).\n- `lint` computes facts. `evolve` guides thinking. Do not confuse them.",
            "specRefs": [],
            "children": []
          }
        ]
      },
      {
        "title": "Report Analysis",
        "body": "Verification produces reports. Reports accumulate over time. Two commands support longitudinal analysis of these reports.",
        "specRefs": [
          "cli:report-diff-missing-a",
          "cli:report-stats-empty"
        ],
        "children": [
          {
            "title": "Report Diff",
            "body": "`specify report diff` compares two gap reports to detect regressions. It takes two report paths (`--a` for baseline, `--b` for new) and produces a structured diff:\n\n```\n$ specify report diff --a baseline-report.json --b new-report.json\n```\n\nThe diff identifies:\n- **New failures**: assertions that passed in the baseline but fail in the new report.\n- **Resolved failures**: assertions that failed in the baseline but pass in the new report.\n- **Changed coverage**: overall coverage percentage change.\n\nNew failures produce exit code `1`, enabling CI/CD gating. A pipeline can run `report diff` against the last known-good report and block deploys when regressions appear.",
            "specRefs": [],
            "children": []
          },
          {
            "title": "Report Stats",
            "body": "`specify report stats` computes statistical confidence from a history of reports:\n\n```\n$ specify report stats --history-dir .specify/history\n```\n\nIt reads all reports from the history directory and calculates trends, flaky assertion detection, and confidence levels. An assertion that passes in 95 out of 100 runs has different reliability than one that passes in 100 out of 100 runs. Stats makes this distinction visible.\n\nThe history directory is populated by `verify` when run with `--history-dir`. Each run appends a timestamped report, building a longitudinal record of system behavior.",
            "specRefs": [],
            "children": []
          }
        ]
      },
      {
        "title": "Spec Auto-Discovery",
        "body": "Commands that take `--spec` auto-discover the spec file when the flag is omitted. The discovery logic searches the current working directory for files matching common spec patterns: `spec.yaml`, `spec.yml`, `spec.json`, `*.spec.yaml`, `*.spec.yml`.\n\nWhen auto-discovery finds a spec, it logs the path to stderr: `Using auto-discovered spec: specify.spec.yaml`. When it finds multiple candidates, it reports them and asks for clarification.\n\nThis means most commands work without flags in a project that has a single spec file:\n\n```\n$ specify lint                     # finds spec.yaml or *.spec.yaml\n$ specify evolve                   # finds and analyzes the spec\n$ specify verify cli               # finds the spec and runs CLI checks\n```\n\nExplicit `--spec` always takes precedence over auto-discovery.",
        "specRefs": [
          "cli:spec-auto-discovery"
        ],
        "children": []
      },
      {
        "title": "Narrative Sync",
        "body": "This bidirectional linking creates a sync problem: either side can change without the other. Specify handles this in three places:\n\n1. **Lint**: When `narrative_path` is set, lint checks that the narrative file exists and that its spec references match actual spec items. A reference to a deleted page produces a warning.\n\n2. **Review**: The HTML browser shows stale references with an orange indicator and \"(stale)\" label. A human reviewing the contract can see immediately where the narrative has drifted.\n\n3. **Evolve**: When analyzing a spec that has a narrative, evolve can suggest narrative updates as part of its suggestions (category `update_narrative`). This guides the agent to keep the prose aligned with the contract.\n\nPath resolution is relative to the spec file's directory, not the current working directory. A spec at `src/spec/examples/nested/app.spec.yaml` with `narrative_path: \"../narrative.md\"` resolves to `src/spec/examples/narrative.md`.",
        "specRefs": [
          "cli:narrative-relative-path-lint",
          "cli:narrative-relative-path-review",
          "page:xxx"
        ],
        "children": []
      },
      {
        "title": "Design Boundaries",
        "body": "Several boundaries in Specify's design are deliberate and should be preserved.\n\n**Lint computes facts. Evolve guides reasoning.** Lint tells you \"this flow references page `foo` which does not exist.\" Evolve tells you \"this login page has no error-state scenario -- consider adding one.\" Both are valuable. Both should stay separate. Mixing them creates a tool that gives structural errors and improvement suggestions in the same output, making it unclear what must be fixed versus what could be improved.\n\n**The tool stays deterministic.** No API keys. No LLM calls. No probabilistic outputs. Every time you run the same command with the same inputs, you get the same result. This makes Specify safe for CI/CD, reproducible for debugging, and trustworthy for verification. Intelligence comes from the agent layer -- the LLM that reads the structured output and makes decisions.\n\n**A spec is not a test suite.** A test suite is a collection of executable checks. A spec is a behavioral contract that serves both humans and agents. The narrative makes it readable. The structured format makes it verifiable. The agent integration makes it actionable. Test suites can be generated from a spec (via `export`), but the spec is the source of truth, not the tests.\n\n**Unverified requirements are failures, not \"untested.\"** If a behavioral requirement exists in the spec and no agent has provided evidence for it, that is a failure. This prevents requirements from accumulating without verification. If you cannot verify a requirement, remove it from the spec or dispatch an agent to verify it.\n\n**Structured output to stdout, human text to stderr.** This is not a style choice -- it is a contract with agents. Agents parse stdout. Humans read stderr. Mixing them breaks both consumers. Every command in Specify follows this contract.\n\n**Errors are typed, not strings.** An `unknown_command` error has an `error` field set to `\"unknown_command\"`, a `command` field with the attempted command, and a `hint` with recovery guidance. Agents match on the `error` field. They never need to regex-match an error message.\n\n**Exit codes are meaningful.** The difference between exit code 1 (assertion failure) and exit code 10 (parse error) and exit code 13 (assumption failure) matters. An agent seeing exit code 13 knows the test environment was not ready -- it should fix the environment, not the spec.",
        "specRefs": [],
        "children": []
      },
      {
        "title": "Self-Specification",
        "body": "Specify specifies itself. The `specify.spec.yaml` file in the project root is a behavioral contract for the Specify CLI. It defines 77 CLI commands with expected exit codes and output assertions, multi-command scenarios for integration testing, and behavioral requirements that need agent verification (like full path coverage).\n\nRunning `specify verify cli --spec specify.spec.yaml` executes every command in the self-spec and reports pass/fail results. This is the primary test suite for the Specify CLI -- the tool verifies itself using its own verification engine.\n\nThe self-spec covers several categories:\n\n- **Self-description**: Running with no arguments produces valid JSON with name, version, commands, global options, and exit codes. Every registered command appears in the output.\n- **Schema introspection**: All three schema targets (spec, report, commands) produce valid JSON conforming to expected schemas.\n- **Error handling**: Invalid inputs produce structured error JSON with error type, context, and hints. Unknown commands, missing files, invalid URLs, and empty parameters all have dedicated test entries.\n- **Feature verification**: Each command is tested with representative inputs -- exports produce framework-specific code, evolve finds real gaps, lint validates structure, review generates HTML.\n- **Scenario sequences**: Multi-command scenarios test round-trips (schema for all targets) and cross-framework consistency (export to both Playwright and Cypress).\n- **Interactive paths**: Every sub-path through the `human` wizard is directly addressable and tested.\n- **Behavioral requirements**: Properties like \"every reachable CLI path has a test entry\" that need agent intelligence to verify.\n\nRunning `specify evolve --spec specify.spec.yaml` against the self-spec produces a summary showing the full command count (77) and suggestions for improving coverage. This is the feedback loop: the tool uses its own analysis capabilities to identify gaps in its own specification.\n\nThis self-referential quality is intentional. If Specify cannot specify its own behavior completely and verify it reliably, it has no business asking other projects to do the same.",
        "specRefs": [
          "cli:no-args-self-description",
          "cli:evolve-no-pr-flag-ok",
          "..."
        ],
        "children": []
      }
    ],
    "specPath": "specify.spec.yaml"
  }
};
</script>
<script>

(function() {
  'use strict';

  const spec = DATA.spec;
  const narrative = DATA.narrative;
  const webReport = DATA.webReport;
  const cliReport = DATA.cliReport;

  // ---- Helpers ----

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function $(id) { return document.getElementById(id); }

  function statusIcon(status) {
    if (status === 'passed') return '<span class="toc-status pass"></span>';
    if (status === 'failed') return '<span class="toc-status fail"></span>';
    if (status === 'mixed') return '<span class="toc-status mixed"></span>';
    return '<span class="toc-status untested"></span>';
  }

  function badgeFor(status, label) {
    const cls = status === 'passed' ? 'pass' : status === 'failed' ? 'fail' : 'untested';
    return '<span class="badge badge-' + cls + '">' + esc(label) + '</span>';
  }

  // ---- Resolve spec ref to report results ----

  function resolveRef(ref) {
    const results = [];
    const parts = ref.split(':');
    const type = parts[0];

    if (type === 'page' && parts[1]) {
      const pageId = parts[1];
      if (webReport) {
        const pr = webReport.pages?.find(p => p.pageId === pageId);
        if (pr) {
          (pr.visualAssertions || []).forEach(a => results.push({ kind: 'visual', ...a }));
          (pr.requests || []).forEach(a => results.push({ kind: 'request', ...a }));
          (pr.consoleExpectations || []).forEach(a => results.push({ kind: 'console', ...a }));
        }
      }
    }

    if (type === 'scenario') {
      const slash = (parts[1] || '').indexOf('/');
      if (slash > 0) {
        const pageId = parts[1].substring(0, slash);
        const scenarioId = parts[1].substring(slash + 1);
        if (webReport) {
          const pr = webReport.pages?.find(p => p.pageId === pageId);
          if (pr) {
            const sr = (pr.scenarios || []).find(s => s.scenarioId === scenarioId);
            if (sr) {
              (sr.steps || []).forEach(step => results.push({ kind: 'scenario-step', ...step }));
              results.push({ kind: 'scenario', scenarioId: sr.scenarioId, status: sr.status, description: sr.description });
            }
          }
        }
      }
    }

    if (type === 'flow' && parts[1]) {
      const flowId = parts[1];
      if (webReport) {
        const fr = (webReport.flows || []).find(f => f.flowId === flowId);
        if (fr) {
          (fr.steps || []).forEach(step => results.push({ kind: 'flow-step', ...step }));
          results.push({ kind: 'flow', flowId: fr.flowId, status: fr.status, description: fr.description });
        }
      }
    }

    if (type === 'request') {
      const rest = parts.slice(1).join(':');
      const slash = rest.indexOf('/');
      if (slash > 0) {
        const pageId = rest.substring(0, slash);
        const reqKey = rest.substring(slash + 1);
        if (webReport) {
          const pr = webReport.pages?.find(p => p.pageId === pageId);
          if (pr) {
            (pr.requests || []).forEach(r => {
              if ((r.method + ':' + r.urlPattern) === reqKey) {
                results.push({ kind: 'request', ...r });
              }
            });
          }
        }
      }
    }

    if (type === 'defaults') {
      if (webReport && webReport.defaults) {
        webReport.defaults.forEach(d => results.push({ kind: 'default', ...d }));
      }
    }

    // CLI report — match by command ID pattern
    if (cliReport) {
      for (const cmd of (cliReport.commands || [])) {
        if (cmd.commandId === ref || cmd.commandId === parts[1]) {
          results.push({ kind: 'cli-command', commandId: cmd.commandId, status: cmd.status,
            description: cmd.description, exitCode: cmd.exitCode,
            stdoutAssertions: cmd.stdoutAssertions, stderrAssertions: cmd.stderrAssertions });
        }
      }
    }

    return results;
  }

  function aggregateStatus(results) {
    if (results.length === 0) return 'untested';
    const hasPass = results.some(r => r.status === 'passed');
    const hasFail = results.some(r => r.status === 'failed');
    if (hasFail) return hasPass ? 'mixed' : 'failed';
    if (hasPass) return 'passed';
    return 'untested';
  }

  // ---- Stale ref detection ----

  const validSpecRefs = new Set(['overview', 'defaults', 'meta']);
  for (const page of (spec.pages || [])) {
    validSpecRefs.add('page:' + page.id);
    for (const s of (page.scenarios || [])) validSpecRefs.add('scenario:' + page.id + '/' + s.id);
    for (const r of (page.expected_requests || [])) validSpecRefs.add('request:' + page.id + '/' + r.method + ':' + r.url_pattern);
  }
  for (const f of (spec.flows || [])) validSpecRefs.add('flow:' + f.id);

  function isStaleRef(ref) { return !validSpecRefs.has(ref); }

  // ---- Build TOC & narrative ----

  let sections = [];
  let activeSectionIdx = -1;

  function buildFromNarrative() {
    if (!narrative) return;

    // Overview
    if (narrative.overview) {
      sections.push({
        title: 'Overview',
        body: narrative.overview,
        refs: ['overview'],
        depth: 1,
        children: []
      });
    }

    function addSection(ns, depth) {
      const idx = sections.length;
      sections.push({
        title: ns.title,
        body: ns.body,
        refs: ns.specRefs || [],
        depth: depth,
        children: []
      });
      for (const child of (ns.children || [])) {
        addSection(child, depth + 1);
      }
    }

    for (const s of narrative.sections) {
      addSection(s, 1);
    }
  }

  function buildFromSpec() {
    // Fallback: build sections from spec structure when no narrative
    if (spec.description) {
      sections.push({ title: 'Overview', body: spec.description, refs: ['overview'], depth: 1, children: [] });
    }
    for (const page of (spec.pages || [])) {
      sections.push({
        title: page.id,
        body: 'Page: ' + page.path + (page.description ? ' — ' + page.description : ''),
        refs: ['page:' + page.id],
        depth: 1,
        children: []
      });
      for (const scenario of (page.scenarios || [])) {
        sections.push({
          title: scenario.id,
          body: scenario.description || '',
          refs: ['scenario:' + page.id + '/' + scenario.id],
          depth: 2,
          children: []
        });
      }
    }
    for (const flow of (spec.flows || [])) {
      sections.push({
        title: flow.id,
        body: flow.description || 'Flow with ' + flow.steps.length + ' steps',
        refs: ['flow:' + flow.id],
        depth: 1,
        children: []
      });
    }
  }

  function renderToc() {
    const toc = $('toc');
    let html = '';
    for (let i = 0; i < sections.length; i++) {
      const s = sections[i];
      const allResults = s.refs.flatMap(r => resolveRef(r));
      const hasStale = s.refs.some(r => isStaleRef(r));
      const status = hasStale ? 'stale' : aggregateStatus(allResults);
      html += '<div class="toc-item depth-' + s.depth + (i === activeSectionIdx ? ' active' : '') + '" data-idx="' + i + '">'
        + (hasStale ? '<span class="toc-status" style="background:var(--orange)"></span>' : statusIcon(status))
        + '<span>' + esc(s.title) + (hasStale ? ' ⚠' : '') + '</span>'
        + '</div>';
    }
    toc.innerHTML = html;

    // Bind clicks
    toc.querySelectorAll('.toc-item').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx);
        selectSection(idx);
      });
    });
  }

  function renderNarrative() {
    const container = $('narrative-view');
    let html = '';
    for (let i = 0; i < sections.length; i++) {
      const s = sections[i];
      const allResults = s.refs.flatMap(r => resolveRef(r));
      const status = aggregateStatus(allResults);
      const counts = { passed: 0, failed: 0, untested: 0 };
      allResults.forEach(r => { if (counts[r.status] !== undefined) counts[r.status]++; });

      const tag = s.depth === 1 ? 'h2' : 'h3';
      html += '<div class="section' + (i === activeSectionIdx ? ' active' : '') + '" data-idx="' + i + '">';
      html += '<div class="section-header">';
      html += '<' + tag + '>' + esc(s.title) + '</' + tag + '>';
      html += '<div class="section-badges">';
      if (allResults.length > 0) {
        if (counts.passed) html += badgeFor('passed', counts.passed + ' passed');
        if (counts.failed) html += badgeFor('failed', counts.failed + ' failed');
        if (counts.untested) html += badgeFor('untested', counts.untested + ' untested');
      } else {
        html += '<span class="badge badge-neutral">no tests</span>';
      }
      html += '</div></div>';

      // Body text (simple markdown-ish rendering)
      if (s.body) {
        const paragraphs = s.body.split('\n\n').filter(Boolean);
        html += '<div class="section-body">';
        for (const p of paragraphs) {
          html += '<p>' + esc(p) + '</p>';
        }
        html += '</div>';
      }

      // Spec refs
      if (s.refs.length > 0) {
        html += '<div class="section-refs">';
        for (const ref of s.refs) {
          const stale = isStaleRef(ref) ? ' stale' : '';
          html += '<span class="ref-tag' + stale + '">' + esc(ref) + (stale ? ' (stale)' : '') + '</span>';
        }
        html += '</div>';
      }

      html += '</div>';
    }
    container.innerHTML = html;

    // Bind clicks
    container.querySelectorAll('.section').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx);
        selectSection(idx);
      });
    });
  }

  function renderSpec() {
    const container = $('spec-view');
    // Pretty-print the spec as indented JSON (YAML would need a lib)
    container.textContent = JSON.stringify(spec, null, 2);
  }

  // ---- Detail panel ----

  function selectSection(idx) {
    activeSectionIdx = idx;
    renderToc();
    renderNarrative();

    const s = sections[idx];
    const allResults = s.refs.flatMap(r => resolveRef(r));

    $('detail-title').textContent = s.title;
    const body = $('detail-body');

    if (allResults.length === 0) {
      body.innerHTML = '<div class="sync-warn">No validation results linked to this section.</div>';
    } else {
      let html = '';

      // Group by kind
      const groups = {};
      for (const r of allResults) {
        const k = r.kind || 'other';
        if (!groups[k]) groups[k] = [];
        groups[k].push(r);
      }

      for (const [kind, items] of Object.entries(groups)) {
        html += '<div class="detail-section">';
        html += '<div class="detail-section-title">' + esc(formatKind(kind)) + '</div>';

        for (const item of items) {
          const cls = item.status === 'passed' ? 'pass' : item.status === 'failed' ? 'fail' : 'untested';
          html += '<div class="assertion-item ' + cls + '">';

          if (item.kind === 'cli-command') {
            html += renderCliCommand(item);
          } else if (item.kind === 'request') {
            html += renderRequest(item);
          } else if (item.kind === 'visual') {
            html += renderVisual(item);
          } else if (item.kind === 'scenario' || item.kind === 'flow') {
            html += renderFlowOrScenario(item);
          } else if (item.kind === 'scenario-step' || item.kind === 'flow-step') {
            html += renderStep(item);
          } else if (item.kind === 'default') {
            html += renderDefault(item);
          } else if (item.kind === 'console') {
            html += renderConsole(item);
          } else {
            html += '<div class="assertion-desc">' + esc(item.description || item.status || 'Unknown') + '</div>';
          }

          html += '</div>';
        }

        html += '</div>';
      }

      body.innerHTML = html;
    }

    $('detail-panel').classList.remove('hidden');

    // Scroll to section in narrative
    const el = document.querySelector('.section[data-idx="' + idx + '"]');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function closeDetail() {
    activeSectionIdx = -1;
    $('detail-panel').classList.add('hidden');
    renderToc();
    renderNarrative();
  }
  window.closeDetail = closeDetail;

  function formatKind(k) {
    return k.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  function renderCliCommand(item) {
    let h = '<div class="assertion-type">CLI Command</div>';
    h += '<div class="assertion-desc">' + esc(item.description || item.commandId) + '</div>';
    if (item.exitCode) {
      h += '<div class="assertion-detail">Exit: expected=' + item.exitCode.expected + ' actual=' + item.exitCode.actual + ' ' + item.exitCode.status + '</div>';
    }
    const allAssertions = (item.stdoutAssertions || []).concat(item.stderrAssertions || []);
    for (const a of allAssertions) {
      const icon = a.status === 'passed' ? '\u2713' : a.status === 'failed' ? '\u2717' : '\u25cb';
      h += '<div class="assertion-detail">' + icon + ' ' + esc(a.description || a.type || '') + '</div>';
    }
    return h;
  }

  function renderRequest(item) {
    let h = '<div class="assertion-type">Request</div>';
    h += '<div class="assertion-desc">' + esc((item.method || '') + ' ' + (item.urlPattern || '')) + '</div>';
    if (item.description) h += '<div class="assertion-detail">' + esc(item.description) + '</div>';
    if (item.matchedUrl) h += '<div class="assertion-detail">Matched: ' + esc(item.matchedUrl) + '</div>';
    if (item.reason) h += '<div class="assertion-detail">' + esc(item.reason) + '</div>';
    return h;
  }

  function renderVisual(item) {
    let h = '<div class="assertion-type">Visual — ' + esc(item.type || '') + '</div>';
    h += '<div class="assertion-desc">' + esc(item.description || item.selector || '') + '</div>';
    if (item.reason) h += '<div class="assertion-detail">' + esc(item.reason) + '</div>';
    return h;
  }

  function renderFlowOrScenario(item) {
    let h = '<div class="assertion-type">' + esc(item.kind) + '</div>';
    h += '<div class="assertion-desc">' + esc(item.description || item.flowId || item.scenarioId || '') + '</div>';
    return h;
  }

  function renderStep(item) {
    let h = '<div class="assertion-type">Step</div>';
    h += '<div class="assertion-desc">' + esc(item.description || item.action || item.type || '') + '</div>';
    if (item.evidence) h += '<div class="assertion-detail">' + esc(item.evidence) + '</div>';
    if (item.reason) h += '<div class="assertion-detail">' + esc(item.reason) + '</div>';
    return h;
  }

  function renderDefault(item) {
    let h = '<div class="assertion-type">Default</div>';
    h += '<div class="assertion-desc">' + esc(item.property || '') + '</div>';
    if (item.details) h += '<div class="assertion-detail">' + esc(item.details) + '</div>';
    return h;
  }

  function renderConsole(item) {
    let h = '<div class="assertion-type">Console — ' + esc(item.level || '') + '</div>';
    h += '<div class="assertion-desc">' + esc(item.description || 'Console expectation') + '</div>';
    if (item.reason) h += '<div class="assertion-detail">' + esc(item.reason) + '</div>';
    return h;
  }

  // ---- View toggle ----

  function setView(view) {
    $('btn-narrative').classList.toggle('active', view === 'narrative');
    $('btn-spec').classList.toggle('active', view === 'spec');
    $('narrative-view').classList.toggle('hidden', view !== 'narrative');
    $('spec-view').classList.toggle('hidden', view !== 'spec');
  }
  window.setView = setView;

  // ---- Summary badges ----

  function renderSummary() {
    const badges = $('summary-badges');
    const reports = [webReport, cliReport].filter(Boolean);
    if (reports.length === 0) {
      badges.innerHTML = '<span class="badge badge-neutral">No reports</span>';
      return;
    }
    let total = 0, passed = 0, failed = 0;
    for (const r of reports) {
      if (r.summary) {
        total += r.summary.total || 0;
        passed += r.summary.passed || 0;
        failed += r.summary.failed || 0;
      }
    }
    const untested = total - passed - failed;
    let html = '';
    if (passed) html += badgeFor('passed', passed + ' passed');
    if (failed) html += badgeFor('failed', failed + ' failed');
    if (untested > 0) html += badgeFor('untested', untested + ' untested');
    if (total > 0) {
      const pct = Math.round((passed / total) * 100);
      html += '<span class="badge badge-neutral">' + pct + '% coverage</span>';
    }
    badges.innerHTML = html;
  }

  // ---- Init ----

  function init() {
    $('spec-title').textContent = spec.name;
    $('spec-version').textContent = 'v' + spec.version;

    if (narrative) {
      buildFromNarrative();
    } else {
      buildFromSpec();
    }

    renderToc();
    renderNarrative();
    renderSpec();
    renderSummary();
  }

  init();
})();

</script>
</body>
</html>
